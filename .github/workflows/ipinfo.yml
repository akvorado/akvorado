---
name: Build IPinfo geoipupdate image
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - docker/*ipinfo-geoipupdate*
  schedule:
    - cron: "33 12 10 */3 *"
jobs:
  docker:
    name: Build Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/metadata-action@v6
        id: meta
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.ipinfo-geoipupdate
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ipinfo-geoipupdate:latest
            quay.io/${{ github.repository_owner }}/ipinfo-geoipupdate:latest
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
