- key: SrcNetPrefix
  name: SrcNetPrefix
  parsertype: prefix
  clickhousetype: String
  clickhousematerializedtype: LowCardinality(String)
  clickhousealias: |-
    CASE
     WHEN EType = 0x800 THEN concat(replaceRegexpOne(IPv6CIDRToRange(SrcAddr, (96 + SrcNetMask)::UInt8).1::String, '^::ffff:', ''), '/', SrcNetMask::String)
     WHEN EType = 0x86dd THEN concat(IPv6CIDRToRange(SrcAddr, SrcNetMask).1::String, '/', SrcNetMask::String)
     ELSE ''
    END
  clickhousemainonly: true
- key: DstNetPrefix
  name: DstNetPrefix
  parsertype: prefix
  clickhousetype: String
  clickhousematerializedtype: LowCardinality(String)
  clickhousealias: |-
    CASE
     WHEN EType = 0x800 THEN concat(replaceRegexpOne(IPv6CIDRToRange(DstAddr, (96 + DstNetMask)::UInt8).1::String, '^::ffff:', ''), '/', DstNetMask::String)
     WHEN EType = 0x86dd THEN concat(IPv6CIDRToRange(DstAddr, DstNetMask).1::String, '/', DstNetMask::String)
     ELSE ''
    END
  clickhousemainonly: true
